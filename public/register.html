<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockFlow · Create account</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="brand-mark"><span class="dot"></span><span>StockFlow</span></div>
      <h1 class="form-title">Create account</h1>
      <p class="form-sub">New accounts start with staff access.</p>

      <form id="register-form">
        <label for="name">Name</label>
        <input type="text" id="name" required>

        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="username">

        <label for="password">Password</label>
        <input type="password" id="password" required minlength="8" autocomplete="new-password">
        <p class="form-sub" style="margin:4px 0 0;">At least 8 characters, with a number.</p>

        <button type="submit" class="btn btn-block" id="register-btn">Create account</button>
      </form>

      <div id="error-box"></div>

      <p class="hint-row">Already have an account? <a href="/index.html">Log in</a></p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    if (Auth.isLoggedIn()) window.location.href = '/dashboard.html';

    const form = document.getElementById('register-form');
    const btn = document.getElementById('register-btn');
    const errorBox = document.getElementById('error-box');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.innerHTML = '';
      btn.disabled = true;
      btn.textContent = 'Creating account…';

      try {
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        await Api.register(name, email, password);
        const data = await Api.login(email, password);
        Auth.setSession(data.accessToken, data.user);
        window.location.href = '/dashboard.html';
      } catch (err) {
        errorBox.innerHTML = `<div class="error-msg">${escapeHtml(err.message)}</div>`;
        btn.disabled = false;
        btn.textContent = 'Create account';
      }
    });
  </script>
</body>
</html>
