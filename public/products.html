<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockFlow · Products</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar-root"></aside>

    <main class="main">
      <div class="page-header">
        <div>
          <h1>Products</h1>
          <p>Manage the product catalog.</p>
        </div>
        <button class="btn" id="new-product-btn">+ New product</button>
      </div>

      <div class="toolbar">
        <input type="text" id="search-input" placeholder="Search by name or SKU…">
      </div>

      <div class="card">
        <table>
          <thead>
            <tr>
              <th>Name</th><th>SKU</th><th class="num">Price</th><th class="num">In stock</th><th></th>
            </tr>
          </thead>
          <tbody id="products-body">
            <tr class="empty-row"><td colspan="5">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Product form modal -->
  <div class="modal-backdrop" id="product-modal">
    <div class="modal">
      <h2 id="modal-title">New product</h2>
      <p class="modal-sub">Fields marked are required.</p>
      <form id="product-form">
        <input type="hidden" id="product-id">
        <label for="product-name">Name</label>
        <input type="text" id="product-name" required>

        <div class="field-row">
          <div>
            <label for="product-sku">SKU</label>
            <input type="text" id="product-sku" required>
          </div>
          <div>
            <label for="product-price">Price</label>
            <input type="number" id="product-price" min="0" step="0.01" required>
          </div>
        </div>

        <label for="product-description">Description</label>
        <textarea id="product-description" rows="3"></textarea>

        <div id="product-error"></div>

        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="cancel-product-btn">Cancel</button>
          <button type="submit" class="btn" id="save-product-btn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/products.js"></script>
</body>
</html>
