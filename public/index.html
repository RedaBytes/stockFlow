<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockFlow · Log in</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="brand-mark"><span class="dot"></span><span>StockFlow</span></div>
      <h1 class="form-title">Log in</h1>
      <p class="form-sub">Sign in to manage products, suppliers, and stock.</p>

      <form id="login-form">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="username">

        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password">

        <button type="submit" class="btn btn-block" id="login-btn">Log in</button>
      </form>

      <div id="error-box"></div>

      <p class="hint-row">No account? <a href="/register.html">Create one</a></p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    if (Auth.isLoggedIn()) window.location.href = '/dashboard.html';

    const form = document.getElementById('login-form');
    const btn = document.getElementById('login-btn');
    const errorBox = document.getElementById('error-box');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.innerHTML = '';
      btn.disabled = true;
      btn.textContent = 'Logging in…';

      try {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const data = await Api.login(email, password);
        Auth.setSession(data.accessToken, data.user);
        window.location.href = '/dashboard.html';
      } catch (err) {
        errorBox.innerHTML = `<div class="error-msg">${escapeHtml(err.message)}</div>`;
        btn.disabled = false;
        btn.textContent = 'Log in';
      }
    });
  </script>
</body>
</html>
