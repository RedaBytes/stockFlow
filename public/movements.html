<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockFlow · Stock Movements</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar-root"></aside>

    <main class="main">
      <div class="page-header">
        <div>
          <h1>Stock Movements</h1>
          <p>Record stock in / stock out and review history.</p>
        </div>
        <div>
          <button class="btn btn-secondary" id="stock-in-btn">Stock in</button>
          <button class="btn" id="stock-out-btn">Stock out</button>
        </div>
      </div>

      <div class="card">
        <table>
          <thead>
            <tr><th>Date</th><th>Product</th><th>SKU</th><th>Type</th><th class="num">Quantity</th></tr>
          </thead>
          <tbody id="movements-body">
            <tr class="empty-row"><td colspan="5">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Stock move modal (shared for in/out) -->
  <div class="modal-backdrop" id="move-modal">
    <div class="modal">
      <h2 id="move-modal-title">Stock in</h2>
      <p class="modal-sub" id="move-modal-sub">Increase quantity on hand for a product.</p>
      <form id="move-form">
        <label for="move-product">Product</label>
        <select id="move-product" required></select>

        <label for="move-quantity">Quantity</label>
        <input type="number" id="move-quantity" min="1" step="1" required>

        <div id="move-error"></div>

        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="cancel-move-btn">Cancel</button>
          <button type="submit" class="btn" id="save-move-btn">Confirm</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/movements.js"></script>
</body>
</html>
